<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>اشتراك جديد - منصة أ/ محمد حسن</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="dashboard-wrapper">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h5><i class="bi bi-mortarboard-fill"></i> منصة أ/ محمد حسن</h5>
      </div>
      <ul class="sidebar-nav nav flex-column">
        <li class="nav-item">
          <a href="dashboard.html" class="nav-link">
            <i class="bi bi-grid-fill"></i> الرئيسية
          </a>
        </li>
        <li class="nav-item">
          <a href="my-courses.html" class="nav-link">
            <i class="bi bi-book-fill"></i> كورساتي
          </a>
        </li>
        <li class="nav-item">
          <a href="notes.html" class="nav-link">
            <i class="bi bi-file-earmark-pdf-fill"></i> الملازم والامتحانات
          </a>
        </li>
        <li class="nav-item">
          <a href="subscription.html" class="nav-link active">
            <i class="bi bi-cart-fill"></i> اشتراك جديد
          </a>
        </li>
        <li class="nav-item" style="margin-top: 2rem;">
          <a href="index.html" class="nav-link">
            <i class="bi bi-box-arrow-right"></i> تسجيل الخروج
          </a>
        </li>
      </ul>
    </aside>

    <button class="sidebar-toggle" id="sidebarToggle">
      <i class="bi bi-list"></i>
    </button>

    <!-- Main Content -->
    <main class="main-content">
      <h3 class="mb-1" style="font-weight:800;">
        <i class="bi bi-cart-fill" style="color:var(--color-primary);"></i> طلب اشتراك جديد
      </h3>
      <p style="color:var(--text-secondary);" class="mb-4">املأ البيانات التالية لإرسال طلب الاشتراك</p>

      <div class="subscription-card animate-fade-in-up">
        <!-- Course Info -->
        <div style="background:var(--bg-primary);border:1px solid var(--border-color);border-radius:12px;padding:1.25rem;margin-bottom:1.5rem;">
          <div class="d-flex align-items-center gap-3">
            <div style="width:50px;height:50px;border-radius:12px;background:linear-gradient(135deg,var(--color-primary),var(--color-secondary));display:flex;align-items:center;justify-content:center;">
              <i class="bi bi-book-half" style="font-size:1.3rem;"></i>
            </div>
            <div>
              <h6 style="font-weight:700;margin:0;">النحو — الفصل الأول</h6>
              <p style="color:var(--text-secondary);margin:0;font-size:0.9rem;">الصف الثالث الثانوي — 150 ج.م</p>
            </div>
          </div>
        </div>

        <form id="subscriptionForm">
          <!-- Full Name -->
          <div class="mb-3">
            <label class="form-label">الاسم الثلاثي <span style="color:#ef4444;">*</span></label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
              <input type="text" class="form-control" placeholder="أدخل الاسم الثلاثي" required>
            </div>
          </div>

          <!-- Phone -->
          <div class="mb-3">
            <label class="form-label">رقم الهاتف <span style="color:#ef4444;">*</span></label>
            <div class="phone-input-group">
              <select class="form-select country-code">
                <option value="+20" selected>+20 🇪🇬</option>
                <option value="+966">+966 🇸🇦</option>
                <option value="+971">+971 🇦🇪</option>
                <option value="+965">+965 🇰🇼</option>
                <option value="+974">+974 🇶🇦</option>
                <option value="+973">+973 🇧🇭</option>
                <option value="+968">+968 🇴🇲</option>
                <option value="+962">+962 🇯🇴</option>
              </select>
              <input type="tel" class="form-control" placeholder="أدخل رقم الهاتف" required>
            </div>
          </div>

          <!-- Governorate -->
          <div class="mb-3">
            <label class="form-label">المحافظة <span style="color:#ef4444;">*</span></label>
            <select class="form-select" required>
              <option value="" disabled selected>اختر المحافظة</option>
              <option value="cairo">القاهرة</option>
              <option value="giza">الجيزة</option>
              <option value="alex">الإسكندرية</option>
              <option value="dakahlia">الدقهلية</option>
              <option value="sharqia">الشرقية</option>
              <option value="qalyubia">القليوبية</option>
              <option value="gharbia">الغربية</option>
              <option value="monufia">المنوفية</option>
              <option value="beheira">البحيرة</option>
              <option value="kafr_elsheikh">كفر الشيخ</option>
              <option value="damietta">دمياط</option>
              <option value="port_said">بورسعيد</option>
              <option value="ismailia">الإسماعيلية</option>
              <option value="suez">السويس</option>
              <option value="fayoum">الفيوم</option>
              <option value="beni_suef">بني سويف</option>
              <option value="minya">المنيا</option>
              <option value="asyut">أسيوط</option>
              <option value="sohag">سوهاج</option>
              <option value="qena">قنا</option>
              <option value="luxor">الأقصر</option>
              <option value="aswan">أسوان</option>
            </select>
          </div>

          <!-- Grade -->
          <div class="mb-4">
            <label class="form-label">الصف الدراسي <span style="color:#ef4444;">*</span></label>
            <select class="form-select" required>
              <option value="" disabled selected>اختر الصف</option>
              <option value="first">أولى ثانوي</option>
              <option value="second">ثانية ثانوي</option>
              <option value="third" selected>ثالثة ثانوي</option>
            </select>
          </div>

          <!-- Payment Method -->
          <div class="mb-4">
            <label class="form-label">طريقة الدفع <span style="color:#ef4444;">*</span></label>
            <div class="row g-2">
              <div class="col-6">
                <input type="radio" class="btn-check" name="payment" id="vodafone" value="vodafone" checked>
                <label class="btn btn-outline-custom w-100" for="vodafone" style="font-size:0.9rem;">
                  <i class="bi bi-phone-fill"></i> فودافون كاش
                </label>
              </div>
              <div class="col-6">
                <input type="radio" class="btn-check" name="payment" id="instapay" value="instapay">
                <label class="btn btn-outline-custom w-100" for="instapay" style="font-size:0.9rem;">
                  <i class="bi bi-credit-card-fill"></i> إنستا باي
                </label>
              </div>
            </div>
          </div>

          <button type="submit" class="btn btn-accent-custom w-100">
            <i class="bi bi-send-fill"></i> إرسال طلب الاشتراك
          </button>
        </form>

        <!-- Success Message (hidden by default) -->
        <div id="successMsg" style="display:none;margin-top:1.5rem;">
          <div style="background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);border-radius:12px;padding:1.5rem;text-align:center;">
            <i class="bi bi-check-circle-fill" style="font-size:2.5rem;color:var(--color-accent);"></i>
            <h5 style="font-weight:700;margin-top:1rem;">تم إرسال طلب الاشتراك بنجاح!</h5>
            <p style="color:var(--text-secondary);">سيتم مراجعة طلبك من قبل المعلم وإرسال الفاتورة إليك</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.getElementById('sidebarToggle').addEventListener('click', function() {
      document.getElementById('sidebar').classList.toggle('show');
    });
  </script>
</body>
</html>
